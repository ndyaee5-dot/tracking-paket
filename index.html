<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Tracking Paket</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .status {
      padding: 10px;
      border-radius: 6px;
      color: white;
      background: red;
      margin-bottom: 15px;
      font-weight: bold;
    }
    .resi {
      margin-bottom: 15px;
    }
    .history {
      border-left: 3px solid #ddd;
      padding-left: 10px;
    }
    .item {
      margin-bottom: 10px;
    }
    .date {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="title">Tracking Paket J&T</div>
  
  <div class="resi">
    Resi: <b id="resi"></b>
  </div>

  <div class="status">
    ⚠️ Paket Hilang / Dalam Investigasi
  </div>

  <div class="history" id="history"></div>
</div>

<script>
  const data = {
    resi: "JPBDG26041958392",
    history: [
      {date: "2026-04-19 08:00", desc: "Paket diterima di gudang asal (Bandung)"},
      {date: "2026-04-19 12:00", desc: "Diproses di pusat sortir Bandung"},
      {date: "2026-04-20 10:00", desc: "Dikirim ke Jakarta"},
      {date: "2026-04-21 09:30", desc: "Terjadi kendala dalam pengiriman"},
      {date: "2026-04-21 14:00", desc: "Paket dinyatakan hilang, dalam investigasi"}
    ]
  };

  document.getElementById("resi").innerText = data.resi;

  const historyDiv = document.getElementById("history");

  data.history.forEach(item => {
    const div = document.createElement("div");
    div.classList.add("item");
    div.innerHTML = `
      <div class="date">${item.date}</div>
      <div>${item.desc}</div>
    `;
    historyDiv.appendChild(div);
  });
</script>

</body>
</html>
